name: Release

on:
  push:
    branches:
      - main
    paths:
      - 'manifest.json'
      - 'package.json'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetch all history for version comparison

      - name: Check if version changed
        id: version_check
        run: |
          CURRENT_VERSION=$(node -p "require('./manifest.json').version")
          echo "Current version: $CURRENT_VERSION"

          # Get the latest release version (if any exist)
          LATEST_RELEASE=$(gh release list --limit 1 --json tagName --jq '.[0].tagName' 2>/dev/null || echo "none")
          echo "Latest release: $LATEST_RELEASE"

          if [ "$LATEST_RELEASE" = "none" ] || [ "$LATEST_RELEASE" != "$CURRENT_VERSION" ]; then
            echo "Version changed or first release - proceeding with release"
            echo "should_release=true" >> $GITHUB_OUTPUT
            echo "VERSION=$CURRENT_VERSION" >> $GITHUB_OUTPUT
          else
            echo "Version unchanged - skipping release"
            echo "should_release=false" >> $GITHUB_OUTPUT
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        if: steps.version_check.outputs.should_release == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        if: steps.version_check.outputs.should_release == 'true'
        run: npm ci --legacy-peer-deps

      - name: Run linter
        if: steps.version_check.outputs.should_release == 'true'
        run: npm run lint

      - name: Run tests
        if: steps.version_check.outputs.should_release == 'true'
        run: npm test

      - name: Build plugin
        if: steps.version_check.outputs.should_release == 'true'
        run: npm run build

      - name: Verify version consistency
        if: steps.version_check.outputs.should_release == 'true'
        run: |
          MANIFEST_VERSION=$(node -p "require('./manifest.json').version")
          PACKAGE_VERSION=$(node -p "require('./package.json').version")

          echo "Manifest version: $MANIFEST_VERSION"
          echo "Package.json version: $PACKAGE_VERSION"

          if [ "$MANIFEST_VERSION" != "$PACKAGE_VERSION" ]; then
            echo "⚠️  Warning: manifest.json version ($MANIFEST_VERSION) does not match package.json ($PACKAGE_VERSION)"
          fi

          echo "✅ Version verification passed"

      - name: Create release notes
        if: steps.version_check.outputs.should_release == 'true'
        id: release_notes
        run: |
          VERSION="${{ steps.version_check.outputs.VERSION }}"

          # Create a temporary file for release notes
          NOTES_FILE=$(mktemp)

          # Extract content between this version and the next version header
          awk "/^## \[$VERSION\]/{flag=1; next} /^## \[/{flag=0} flag" CHANGELOG.md > "$NOTES_FILE"

          # If we found notes, use them; otherwise use a default message
          if [ -s "$NOTES_FILE" ]; then
            echo "Found release notes in CHANGELOG.md"
            cat "$NOTES_FILE"
          else
            echo "No specific release notes found in CHANGELOG.md" > "$NOTES_FILE"
            echo "See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details." >> "$NOTES_FILE"
          fi

          # Output the file path
          echo "notes_file=$NOTES_FILE" >> $GITHUB_OUTPUT

      - name: Download Pandoc binaries
        if: steps.version_check.outputs.should_release == 'true'
        run: |
          set -euo pipefail
          mkdir -p dist/binaries
          VERSION="${{ steps.version_check.outputs.VERSION }}"
          PANDOC_VER="3.9.0.2"

          echo "📦 Downloading Pandoc ${PANDOC_VER} for all platforms..."
          PANDOC_BASE="https://github.com/jgm/pandoc/releases/download/${PANDOC_VER}"

          # Darwin ARM64
          curl -fsSL "${PANDOC_BASE}/pandoc-${PANDOC_VER}-arm64-macOS.zip" -o /tmp/pandoc-darwin-arm64.zip
          unzip -p /tmp/pandoc-darwin-arm64.zip "bin/pandoc" | gzip > "dist/binaries/pandoc-darwin-arm64.gz"

          # Darwin x64
          curl -fsSL "${PANDOC_BASE}/pandoc-${PANDOC_VER}-x86_64-macOS.zip" -o /tmp/pandoc-darwin-x64.zip
          unzip -p /tmp/pandoc-darwin-x64.zip "bin/pandoc" | gzip > "dist/binaries/pandoc-darwin-x64.gz"

          # Linux x64
          curl -fsSL "${PANDOC_BASE}/pandoc-${PANDOC_VER}-linux-amd64.tar.gz" -o /tmp/pandoc-linux-x64.tar.gz
          tar -xzf /tmp/pandoc-linux-x64.tar.gz -O "pandoc-${PANDOC_VER}/bin/pandoc" | gzip > "dist/binaries/pandoc-linux-x64.gz"

          # Linux ARM64
          curl -fsSL "${PANDOC_BASE}/pandoc-${PANDOC_VER}-linux-arm64.tar.gz" -o /tmp/pandoc-linux-arm64.tar.gz
          tar -xzf /tmp/pandoc-linux-arm64.tar.gz -O "pandoc-${PANDOC_VER}/bin/pandoc" | gzip > "dist/binaries/pandoc-linux-arm64.gz"

          # Windows x64
          curl -fsSL "${PANDOC_BASE}/pandoc-${PANDOC_VER}-windows-x86_64.zip" -o /tmp/pandoc-win32-x64.zip
          unzip -p /tmp/pandoc-win32-x64.zip "pandoc.exe" | gzip > "dist/binaries/pandoc-win32-x64.gz"

          echo "✅ Pandoc binaries downloaded"

      - name: Download Typst binaries
        if: steps.version_check.outputs.should_release == 'true'
        run: |
          set -euo pipefail
          TYPST_VER="0.14.2"

          echo "📦 Downloading Typst ${TYPST_VER} for all platforms..."
          TYPST_BASE="https://github.com/typst/typst/releases/download/v${TYPST_VER}"

          # Darwin ARM64
          curl -fsSL "${TYPST_BASE}/typst-aarch64-apple-darwin.tar.xz" -o /tmp/typst-darwin-arm64.tar.xz
          tar -xJf /tmp/typst-darwin-arm64.tar.xz -O "typst-aarch64-apple-darwin/typst" | gzip > "dist/binaries/typst-darwin-arm64.gz"

          # Darwin x64
          curl -fsSL "${TYPST_BASE}/typst-x86_64-apple-darwin.tar.xz" -o /tmp/typst-darwin-x64.tar.xz
          tar -xJf /tmp/typst-darwin-x64.tar.xz -O "typst-x86_64-apple-darwin/typst" | gzip > "dist/binaries/typst-darwin-x64.gz"

          # Linux x64
          curl -fsSL "${TYPST_BASE}/typst-x86_64-unknown-linux-musl.tar.xz" -o /tmp/typst-linux-x64.tar.xz
          tar -xJf /tmp/typst-linux-x64.tar.xz -O "typst-x86_64-unknown-linux-musl/typst" | gzip > "dist/binaries/typst-linux-x64.gz"

          # Linux ARM64
          curl -fsSL "${TYPST_BASE}/typst-aarch64-unknown-linux-musl.tar.xz" -o /tmp/typst-linux-arm64.tar.xz
          tar -xJf /tmp/typst-linux-arm64.tar.xz -O "typst-aarch64-unknown-linux-musl/typst" | gzip > "dist/binaries/typst-linux-arm64.gz"

          # Windows x64
          curl -fsSL "${TYPST_BASE}/typst-x86_64-pc-windows-msvc.zip" -o /tmp/typst-win32-x64.zip
          unzip -p /tmp/typst-win32-x64.zip "typst-x86_64-pc-windows-msvc/typst.exe" | gzip > "dist/binaries/typst-win32-x64.gz"

          echo "✅ Typst binaries downloaded"

      - name: Generate tools manifest
        if: steps.version_check.outputs.should_release == 'true'
        run: |
          set -euo pipefail
          VERSION="${{ steps.version_check.outputs.VERSION }}"
          REPO="${{ github.repository }}"
          BASE_URL="https://github.com/${REPO}/releases/download/${VERSION}"

          echo "📝 Generating tools-manifest.json..."
          node scripts/generate-manifest.js "${VERSION}" "${BASE_URL}"

          echo "✅ Manifest generated"

      - name: Create Release
        if: steps.version_check.outputs.should_release == 'true'
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version_check.outputs.VERSION }}
          name: ${{ steps.version_check.outputs.VERSION }}
          body_path: ${{ steps.release_notes.outputs.notes_file }}
          draft: false
          prerelease: false
          files: |
            main.js
            manifest.json
            styles.css
            dist/binaries/*.gz
            dist/tools-manifest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Release Summary
        if: steps.version_check.outputs.should_release == 'true'
        run: |
          echo "✅ Release ${{ steps.version_check.outputs.VERSION }} created successfully!"
          echo "📦 Uploaded plugin files: main.js, manifest.json, styles.css"
          echo "📦 Uploaded binaries: $(ls -1 dist/binaries/*.gz | wc -l) platform binaries"
          echo "📦 Uploaded manifest: tools-manifest.json"
          echo "🔗 Release URL: ${{ steps.create_release.outputs.url }}"
